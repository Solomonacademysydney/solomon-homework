<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solomon Math Academy – Weekly Homework</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #162040;
    --blue: #b8960c;
    --sky: #d4af37;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #fbbf24;
    --orange: #f97316;
    --bg: #f8f6ef;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes floatBadge {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    background: #0b1220;
    font-family: 'Nunito', sans-serif;
  }

  /* LEFT PANEL */
  .login-left {
    flex: 1.1;
    background: linear-gradient(160deg, #0b1220 0%, #162040 60%, #1e2e55 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    position: relative;
    overflow: hidden;
  }
  /* decorative corner lines */
  .login-left::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(212,175,55,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,175,55,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  /* gold arc top-right */
  .login-left::after {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 380px; height: 380px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.18);
    pointer-events: none;
  }
  .login-deco-ring {
    position: absolute;
    bottom: -80px; left: -80px;
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 1.5px solid rgba(212,175,55,0.12);
    pointer-events: none;
  }

  .login-crest-wrap {
    position: relative;
    animation: fadeUp .8s ease both, floatBadge 5s ease-in-out infinite;
    margin-bottom: 28px;
  }
  .login-crest {
    width: 160px; height: 160px;
    filter: drop-shadow(0 0 20px rgba(212,175,55,0.3));
  }

  .login-academy-name {
    text-align: center;
    animation: fadeUp .9s .15s ease both;
  }
  .login-academy-name .name-line1 {
    font-family: 'Cinzel Decorative', 'Baloo 2', cursive;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(212,175,55,0.7);
    margin-bottom: 6px;
  }
  .login-academy-name .name-line2 {
    font-family: 'Cinzel', 'Baloo 2', cursive;
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(212,175,55,0.3);
  }
  .login-academy-name .name-line2 span {
    color: #d4af37;
  }
  .login-academy-name .name-line3 {
    font-family: 'Cinzel', 'Baloo 2', cursive;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .login-divider {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    margin: 24px auto;
    animation: fadeUp .9s .25s ease both;
  }
  .login-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    animation: fadeUp .9s .3s ease both;
  }

  /* RIGHT PANEL */
  .login-right {
    flex: 0.9;
    background: #f8f6ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    position: relative;
  }
  .login-right::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, transparent, #d4af37 30%, #d4af37 70%, transparent);
  }
  .login-form-wrap {
    width: 100%;
    max-width: 360px;
    animation: fadeUp .8s .2s ease both;
  }
  .login-form-title {
    font-family: 'Cinzel', 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 700;
    color: #162040;
    margin-bottom: 4px;
  }
  .login-form-sub {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 32px;
  }

  .login-box {
    background: transparent;
    border-radius: 0;
    padding: 0;
    width: 100%;
    max-width: 360px;
    box-shadow: none;
    text-align: left;
  }
  .login-logo { display: none; }
  .login-sub  { display: none; }
  .role-tabs { display: flex; background: #edeae0; border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .role-tab {
    flex: 1; padding: 10px; border: none; background: none;
    border-radius: 10px; cursor: pointer; font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 14px; color: var(--muted); transition: all .2s;
  }
  .role-tab.active { background: white; color: var(--navy); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .form-group { margin-bottom: 18px; text-align: left; }
  .form-group label { display: block; font-weight: 700; font-size: 13px; color: var(--navy); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px;
    outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: #b8960c; }
  .btn-login {
    width: 100%; padding: 14px; background: #162040; color: white;
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer; transition: all .2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: linear-gradient(90deg, #0d1526, #162040); transform: translateY(-1px); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; font-weight: 700; }
  .hint-box {
    background: #f8faff; border-radius: 12px; padding: 14px 16px;
    margin-top: 24px; text-align: left; font-size: 13px; color: var(--muted);
    border: 1px solid var(--border);
  }
  .hint-box strong { color: var(--navy); display: block; margin-bottom: 4px; }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; }
  .topbar {
    background: linear-gradient(90deg, #0d1526, #162040);
    color: white; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(26,39,68,0.3);
  }
  .topbar-logo { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; }
  .topbar-logo span { color: var(--sky); }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-user { font-size: 14px; font-weight: 700; opacity: .85; }
  .btn-logout {
    padding: 7px 16px; background: rgba(255,255,255,.15); border: none;
    border-radius: 8px; color: white; font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer; transition: background .2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.25); }

  .main { padding: 32px; max-width: 960px; margin: 0 auto; }

  /* ── STUDENT VIEW ── */
  .week-header {
    background: linear-gradient(135deg, #162040, #b8960c);
    color: white; border-radius: var(--radius); padding: 28px 32px;
    margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center;
  }
  .week-header h1 { font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 800; }
  .week-header p { opacity: .85; font-size: 14px; margin-top: 4px; }
  .progress-ring { text-align: right; }
  .progress-ring .num { font-size: 36px; font-weight: 900; line-height: 1; }
  .progress-ring .lbl { font-size: 12px; opacity: .8; }

  .question-card {
    background: white; border-radius: var(--radius); padding: 28px 32px;
    margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
    border: 2px solid transparent; transition: border-color .2s;
  }
  .question-card.answered { border-color: #dbeafe; }
  .question-card.correct { border-color: #bbf7d0; background: #f0fdf4; }
  .question-card.wrong { border-color: #fecaca; background: #fff5f5; }
  .q-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .q-num {
    width: 36px; height: 36px; background: #162040; color: #d4af37;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 15px; flex-shrink: 0;
  }
  .q-meta { flex: 1; }
  .q-type-badge {
    display: inline-block; font-size: 11px; font-weight: 800;
    padding: 2px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-mc { background: #fef8e1; color: #7a6200; }
  .badge-sa { background: #fef9c3; color: #a16207; }
  .badge-ox { background: #f3e8ff; color: #7c3aed; }
  .badge-wr { background: #ffe4e6; color: #be123c; }
  .q-year { font-size: 12px; color: var(--muted); font-weight: 600; margin-left: 8px; }
  .q-text { font-size: 16px; font-weight: 700; color: var(--navy); line-height: 1.5; margin-bottom: 20px; }
  .q-image { width:100%; max-width:340px; border-radius:10px; margin-bottom:16px; }

  /* MCQ */
  .mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mc-opt {
    padding: 12px 16px; border: 2px solid var(--border); border-radius: 12px;
    cursor: pointer; font-weight: 700; font-size: 15px; transition: all .15s;
    display: flex; align-items: center; gap: 10px; background: white;
    text-align: left;
  }
  .mc-opt:hover:not(:disabled) { border-color: #b8960c; background: #fef8e1; }
  .mc-opt.selected { border-color: #b8960c; background: #fef8e1; color: #162040; }
  .mc-opt.correct-ans { border-color: var(--green); background: #dcfce7; color: #166534; }
  .mc-opt.wrong-ans { border-color: var(--red); background: #fee2e2; color: #991b1b; }
  .mc-opt:disabled { cursor: default; }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; flex-shrink: 0; color: var(--navy);
  }
  .mc-opt.selected .opt-letter { background: #162040; color: #d4af37; }
  .mc-opt.correct-ans .opt-letter { background: var(--green); color: white; }
  .mc-opt.wrong-ans .opt-letter { background: var(--red); color: white; }

  /* Short Answer */
  .sa-input {
    width: 100%; max-width: 300px; padding: 12px 16px;
    border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    outline: none; transition: border-color .2s;
  }
  .sa-input:focus { border-color: #b8960c; }
  .sa-input.correct-input { border-color: var(--green); background: #f0fdf4; }
  .sa-input.wrong-input { border-color: var(--red); background: #fff5f5; }

  /* OX */
  .ox-options { display: flex; gap: 16px; }
  .ox-btn {
    flex: 1; max-width: 140px; padding: 16px; border: 2px solid var(--border);
    border-radius: 16px; font-size: 28px; cursor: pointer; transition: all .15s;
    background: white; font-weight: 900; text-align: center;
  }
  .ox-btn:hover:not(:disabled) { transform: scale(1.05); }
  .ox-btn.selected-o { border-color: var(--blue); background: #dbeafe; }
  .ox-btn.selected-x { border-color: var(--orange); background: #fff7ed; }
  .ox-btn.correct-ans { border-color: var(--green); background: #dcfce7; }
  .ox-btn.wrong-ans { border-color: var(--red); background: #fee2e2; }

  /* Written */
  .written-area {
    width: 100%; min-height: 100px; padding: 12px 16px;
    border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
    resize: vertical; outline: none; transition: border-color .2s;
  }
  .written-area:focus { border-color: #b8960c; }

  .q-feedback {
    margin-top: 16px; padding: 12px 16px; border-radius: 10px;
    font-size: 14px; font-weight: 700; display: none;
  }
  .q-feedback.show { display: block; }
  .q-feedback.correct-fb { background: #dcfce7; color: #166534; }
  .q-feedback.wrong-fb { background: #fee2e2; color: #991b1b; }
  .q-feedback.pending-fb { background: #fef9c3; color: #854d0e; }

  .btn-submit-q {
    margin-top: 16px; padding: 10px 24px; background: #162040;
    color: white; border: none; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
    cursor: pointer; transition: all .2s;
  }
  .btn-submit-q:hover { background: linear-gradient(90deg, #0d1526, #162040); }
  .btn-submit-q:disabled { background: var(--border); color: var(--muted); cursor: default; }

  .submit-hw-bar {
    background: white; border-radius: var(--radius); padding: 24px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); display: flex;
    align-items: center; justify-content: space-between; margin-top: 8px;
  }
  .submit-hw-bar p { font-weight: 700; color: var(--navy); }
  .submit-hw-bar span { font-size: 14px; color: var(--muted); }
  .btn-submit-hw {
    padding: 13px 32px; background: var(--green); color: white;
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 16px; cursor: pointer; transition: all .2s;
  }
  .btn-submit-hw:hover { background: #16a34a; transform: translateY(-1px); }
  .btn-submit-hw:disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }

  .score-banner {
    background: linear-gradient(135deg, #166534, #22c55e);
    color: white; border-radius: var(--radius); padding: 32px;
    text-align: center; margin-bottom: 28px; display: none;
  }
  .score-banner.show { display: block; }
  .score-banner .big-score { font-size: 64px; font-weight: 900; font-family: 'Baloo 2', cursive; }
  .score-banner p { font-size: 18px; font-weight: 700; opacity: .9; margin-top: 8px; }

  /* ── TEACHER VIEW ── */
  .teacher-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
  .t-tab {
    padding: 10px 24px; border: 2px solid var(--border); border-radius: 12px;
    background: white; font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 14px; cursor: pointer; color: var(--muted); transition: all .2s;
  }
  .t-tab.active { background: linear-gradient(90deg, #0d1526, #162040); border-color: var(--navy); color: white; }

  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th {
    background: linear-gradient(90deg, #0d1526, #162040); color: white; padding: 14px 16px;
    text-align: left; font-size: 13px; font-weight: 800; letter-spacing: .3px;
  }
  .results-table th:first-child { border-radius: 12px 0 0 0; }
  .results-table th:last-child { border-radius: 0 12px 0 0; }
  .results-table td {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 600; background: white;
  }
  .results-table tr:hover td { background: #f8faff; }
  .score-pill {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-weight: 800; font-size: 13px;
  }
  .score-a { background: #dcfce7; color: #166534; }
  .score-b { background: #fef8e1; color: #7a6200; }
  .score-c { background: #fef9c3; color: #854d0e; }
  .score-d { background: #fee2e2; color: #991b1b; }
  .score-pending { background: #f3e8ff; color: #6b21a8; }
  .score-none { background: var(--border); color: var(--muted); }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: white; border-radius: var(--radius); padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); text-align: center;
  }
  .stat-card .stat-num { font-size: 40px; font-weight: 900; font-family: 'Baloo 2', cursive; color: #162040; }
  .stat-card .stat-lbl { font-size: 13px; color: var(--muted); font-weight: 700; margin-top: 4px; }

  .detail-panel {
    background: white; border-radius: var(--radius); padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-top: 20px; display: none;
  }
  .detail-panel.show { display: block; }
  .detail-panel h3 { font-family: 'Baloo 2', cursive; font-size: 20px; color: var(--navy); margin-bottom: 16px; }
  .detail-q { padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .detail-correct { background: #f0fdf4; border-left: 4px solid var(--green); }
  .detail-wrong { background: #fff5f5; border-left: 4px solid var(--red); }
  .detail-pending { background: #fefce8; border-left: 4px solid var(--yellow); }
  .detail-none { background: var(--bg); border-left: 4px solid var(--border); }

  /* Add question form */
  .add-q-form { background: white; border-radius: var(--radius); padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .add-q-form h2 { font-family: 'Baloo 2', cursive; font-size: 22px; color: var(--navy); margin-bottom: 24px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-weight: 800; font-size: 13px; color: var(--navy); margin-bottom: 6px; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 11px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: #b8960c; }
  .btn-add-q {
    padding: 12px 28px; background: #162040; color: white;
    border: none; border-radius: 10px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; cursor: pointer; transition: all .2s;
  }
  .btn-add-q:hover { background: linear-gradient(90deg, #0d1526, #162040); }
  .success-msg { color: var(--green); font-weight: 800; font-size: 14px; margin-top: 12px; display: none; }

  .q-list-admin { margin-top: 28px; }
  .q-admin-item {
    background: white; border-radius: 12px; padding: 16px 20px;
    margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.05);
    display: flex; align-items: center; gap: 16px;
  }
  .q-admin-item .q-admin-text { flex: 1; font-size: 14px; font-weight: 700; }
  .q-admin-item .q-admin-meta { font-size: 12px; color: var(--muted); font-weight: 600; }
  .btn-del {
    padding: 6px 14px; background: #fee2e2; color: var(--red);
    border: none; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 13px; cursor: pointer;
  }
  .btn-del:hover { background: var(--red); color: white; }

  .section-title { font-family: 'Baloo 2', cursive; font-size: 22px; color: #162040; margin-bottom: 20px; }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-weight: 700; }

  /* written review */
  .written-review-input {
    width: 100%; padding: 10px; border: 2px solid var(--border);
    border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 14px; outline: none;
    margin-top: 8px;
  }
  .btn-grade {
    margin-top: 8px; padding: 7px 16px; background: var(--orange);
    color: white; border: none; border-radius: 8px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; cursor: pointer;
  }
  .btn-grade:hover { background: #ea580c; }

  @media (max-width: 768px) {
    #loginScreen { flex-direction: column; }
    .login-left { padding: 40px 24px 32px; flex: none; }
    .login-right { flex: none; padding: 32px 24px 40px; }
    .login-right::before { width: 100%; height: 4px; top: 0; left: 0; }
  }
  @media (max-width: 640px) {
    .main { padding: 16px; }
    .mc-options { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }

    .week-header { flex-direction: column; gap: 16px; }

  }
</style>
</head>
<body>

    <div class="login-academy-name">

  <!-- RIGHT: Form -->
  <div class="login-right">
    <div class="login-form-wrap">
      <div class="login-form-title">Welcome Back</div>
      <div class="login-form-sub">Sign in to access your homework portal</div>
      <div class="login-box">

<!-- ══- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="#d4af37" stroke-width="1.2" opacity="0.6"/>
          <polygon points="18,8 23,14 30,12 26,20 28,28 18,24 8,28 10,20 6,12 13,14" fill="none" stroke="#d4af37" stroke-width="1.3" opacity="0.9"/>
          <circle cx="18" cy="18" r="3" fill="#d4af37" opacity="0.8"/>
        </svg>
        <div class="topbar-logo">Solomon <span>Math</span> Academy</div>
      </div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbarUser"></div>
      <button class="btn-logout" onclick="doLogout()">Log Out</button>
    </div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ═══════════════════════════════════════
//   DATA STORE (localStorage)
// ═══════════════════════════════════════
const STORE_KEY = 'solomon_data';

function getStore() {
  const raw = localStorage.getItem(STORE_KEY);
  if (raw) return JSON.parse(raw);
  return initStore();
}
function saveStore(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

function initStore() {
  const data = {
    users: [
      { id: 'teacher',   pw: 'solomon2024', role: 'teacher', name: 'Ms. Kim' },
      { id: 'student01', pw: 'math2024',   role: 'student', name: 'Alex',   year: 5 },
      { id: 'student02', pw: 'math2024',   role: 'student', name: 'Sophie', year: 7 },
      { id: 'student03', pw: 'math2024',   role: 'student', name: 'Liam',   year: 3 },
      { id: 'student04', pw: 'math2024',   role: 'student', name: 'Mia',    year: 9 },
      { id: 'student05', pw: 'math2024',   role: 'student', name: 'Ethan',  year: 6 },
    ],
    currentWeek: 1,
    questions: getDefaultQuestions(),
    submissions: {}   // { 'student01_week1': { answers:{}, score:null, submitted: false } }
  };
  saveStore(data);
  return data;
}

function getDefaultQuestions() {
  return [
    // Week 1 – Year 3-4
    { id: 'q1',  week:1, year:'Year 3-4', type:'mc',  text:'What is 47 + 35?',
      options:['72','82','81','92'], answer:'82',
      hint:'Add tens first: 40+30=70, then ones: 7+5=12. Total = 82.' },

    { id: 'q2',  week:1, year:'Year 3-4', type:'ox',  text:'True or False: 9 × 6 = 54',
      answer:'O', hint:'9 × 6 = 54 ✓ This is correct!' },

    { id: 'q3',  week:1, year:'Year 3-4', type:'sa',  text:'A bag has 24 apples. If you divide them equally into 4 bags, how many apples are in each bag?',
      answer:'6', hint:'24 ÷ 4 = 6' },

    // Week 1 – Year 5-6
    { id: 'q4',  week:1, year:'Year 5-6', type:'mc',  text:'What is 15% of 200?',
      options:['20','25','30','35'], answer:'30',
      hint:'15% = 15/100. So 200 × 15/100 = 30.' },

    { id: 'q5',  week:1, year:'Year 5-6', type:'sa',  text:'A rectangle has a length of 12 cm and a width of 7 cm. What is its area in cm²?',
      answer:'84', hint:'Area = length × width = 12 × 7 = 84 cm²' },

    { id: 'q6',  week:1, year:'Year 5-6', type:'ox',  text:'True or False: The perimeter of a square with side 8 cm is 32 cm.',
      answer:'O', hint:'Perimeter = 4 × side = 4 × 8 = 32 cm ✓' },

    // Week 1 – Year 7-9
    { id: 'q7',  week:1, year:'Year 7-9', type:'mc',  text:'Solve: 3x + 7 = 22. What is x?',
      options:['3','5','7','4'], answer:'5',
      hint:'3x = 22 - 7 = 15, so x = 15 ÷ 3 = 5.' },

    { id: 'q8',  week:1, year:'Year 7-9', type:'sa',  text:'What is the value of 4² + √36?',
      answer:'22', hint:'4² = 16, √36 = 6. So 16 + 6 = 22.' },

    { id: 'q9',  week:1, year:'Year 7-9', type:'mc',  text:'Which of the following is a prime number?',
      options:['21','27','29','33'], answer:'29',
      hint:'29 is divisible only by 1 and 29. The others are composite.' },

    { id: 'q10', week:1, year:'Year 7-9', type:'written',
      text:'A phone costs $850. It goes on sale for 20% off. Later, the sale price is increased by 10%. What is the final price? Show all working.',
      answer:null, hint:'Step 1: 20% off → 850 × 0.8 = $680. Step 2: 10% on → 680 × 1.1 = $748.' },
  ];
}

// ═══════════════════════════════════════
//   AUTH
// ═══════════════════════════════════════
let currentUser = null;
let loginRole = 'student';

function setRole(r) {
  loginRole = r;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && r==='student') || (i===1 && r==='teacher'));
  });
  document.getElementById('loginId').placeholder = r === 'teacher' ? 'e.g. teacher' : 'e.g. student01';
  document.getElementById('hintBox').innerHTML = r === 'teacher'
    ? '<strong>🔑 Teacher Account</strong>Username: <b>teacher</b> / Password: <b>solomon2024</b>'
    : '<strong>🔑 Demo Student</strong>Username: <b>student01</b> / Password: <b>math2024</b><br>All students use password: <b>math2024</b>';
}

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const store = getStore();
  const user = store.users.find(u => u.id === id && u.pw === pw && u.role === loginRole);
  if (!user) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbarUser').textContent = `${user.name} (${user.role === 'teacher' ? 'Teacher' : 'Year ' + user.year})`;
  if (user.role === 'teacher') renderTeacher();
  else renderStudent();
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

// ═══════════════════════════════════════
//   STUDENT VIEW
// ═══════════════════════════════════════
function getSubmissionKey(uid, week) { return `${uid}_week${week}`; }

function getOrCreateSubmission(store, uid, week) {
  const key = getSubmissionKey(uid, week);
  if (!store.submissions[key]) {
    store.submissions[key] = { answers: {}, score: null, submitted: false, writtenGrades: {} };
    saveStore(store);
  }
  return store.submissions[key];
}

function getStudentYearGroup(year) {
  if (year <= 4) return 'Year 3-4';
  if (year <= 6) return 'Year 5-6';
  return 'Year 7-9';
}

function renderStudent() {
  const store = getStore();
  const week = store.currentWeek;
  const yearGroup = getStudentYearGroup(currentUser.year);
  const questions = store.questions.filter(q => q.week === week && q.year === yearGroup);
  const sub = getOrCreateSubmission(store, currentUser.id, week);

  const answered = Object.keys(sub.answers).length;
  const autoQ = questions.filter(q => q.type !== 'written');
  const correctCount = autoQ.filter(q => {
    const a = sub.answers[q.id];
    return a !== undefined && a === q.answer;
  }).length;

  let html = '';

  // Score banner if submitted
  if (sub.submitted) {
    const totalAuto = autoQ.length;
    const pct = totalAuto > 0 ? Math.round(correctCount / totalAuto * 100) : 0;
    const writtenQ = questions.filter(q => q.type === 'written');
    const hasUngraded = writtenQ.some(q => sub.writtenGrades[q.id] === undefined);
    html += `
      <div class="score-banner show">
        <div class="big-score">${pct}%</div>
        <p>Week ${week} Homework Submitted! ${correctCount}/${totalAuto} auto-graded correct.
        ${writtenQ.length > 0 ? (hasUngraded ? ' Written answers pending teacher review.' : ' All done!') : ''}</p>
      </div>`;
  }

  // Week header
  html += `
    <div class="week-header">
      <div>
        <h1>📚 Week ${week} Homework</h1>
        <p>${yearGroup} · ${questions.length} questions · Due this Friday</p>
      </div>
      <div class="progress-ring">
        <div class="num">${answered}/${questions.length}</div>
        <div class="lbl">answered</div>
      </div>
    </div>`;

  if (questions.length === 0) {
    html += '<div class="empty-state">No questions yet for this week. Check back soon! 🎉</div>';
  }

  questions.forEach((q, idx) => {
    const userAns = sub.answers[q.id];
    const isSubmitted = sub.submitted;
    let cardClass = userAns !== undefined ? 'answered' : '';
    if (isSubmitted && q.type !== 'written') {
      cardClass = userAns === q.answer ? 'correct' : 'wrong';
    }

    const typeBadge = { mc:'badge-mc', sa:'badge-sa', ox:'badge-ox', written:'badge-wr' }[q.type];
    const typeLabel = { mc:'Multiple Choice', sa:'Short Answer', ox:'True / False', written:'Written' }[q.type];

    html += `<div class="question-card ${cardClass}" id="qcard_${q.id}">
      <div class="q-header">
        <div class="q-num">${idx + 1}</div>
        <div class="q-meta">
          <span class="q-type-badge ${typeBadge}">${typeLabel}</span>
          <span class="q-year">${q.year}</span>
        </div>
      </div>
      <div class="q-text">${q.text}</div>`;

    if (q.type === 'mc') {
      html += `<div class="mc-options">`;
      const letters = ['A','B','C','D'];
      q.options.forEach((opt, oi) => {
        let cls = '';
        if (isSubmitted) {
          if (opt === q.answer) cls = 'correct-ans';
          else if (opt === userAns && userAns !== q.answer) cls = 'wrong-ans';
        } else if (opt === userAns) cls = 'selected';
        html += `<button class="mc-opt ${cls}" onclick="answerMC('${q.id}','${opt}')"
          ${isSubmitted ? 'disabled' : ''}>
          <span class="opt-letter">${letters[oi]}</span>${opt}
        </button>`;
      });
      html += `</div>`;
    }

    if (q.type === 'sa') {
      const cls = isSubmitted ? (userAns === q.answer ? 'correct-input' : 'wrong-input') : '';
      html += `<input class="sa-input ${cls}" id="sa_${q.id}" type="text"
        placeholder="Type your answer..." value="${userAns || ''}"
        ${isSubmitted ? 'disabled' : ''}
        onchange="answerSA('${q.id}', this.value)">`;
    }

    if (q.type === 'ox') {
      const oClass = isSubmitted ? (q.answer === 'O' ? 'correct-ans' : (userAns==='O' && q.answer!=='O' ? 'wrong-ans' : '')) : (userAns==='O' ? 'selected-o' : '');
      const xClass = isSubmitted ? (q.answer === 'X' ? 'correct-ans' : (userAns==='X' && q.answer!=='X' ? 'wrong-ans' : '')) : (userAns==='X' ? 'selected-x' : '');
      html += `<div class="ox-options">
        <button class="ox-btn ${oClass}" onclick="answerOX('${q.id}','O')" ${isSubmitted?'disabled':''}>⭕ True</button>
        <button class="ox-btn ${xClass}" onclick="answerOX('${q.id}','X')" ${isSubmitted?'disabled':''}>❌ False</button>
      </div>`;
    }

    if (q.type === 'written') {
      const grade = sub.writtenGrades?.[q.id];
      const gradeDisplay = grade !== undefined ? ` (Teacher grade: ${grade}/10)` : (isSubmitted ? ' (Awaiting teacher grade)' : '');
      html += `<textarea class="written-area" id="wr_${q.id}" rows="4"
        placeholder="Show your working and write your answer here..."
        ${isSubmitted ? 'disabled' : ''}
        onchange="answerWritten('${q.id}', this.value)">${userAns || ''}</textarea>
        ${gradeDisplay ? `<div style="font-size:13px;font-weight:700;color:var(--muted);margin-top:6px;">${gradeDisplay}</div>` : ''}`;
    }

    // Feedback
    if (isSubmitted && q.type !== 'written') {
      const correct = userAns === q.answer;
      html += `<div class="q-feedback show ${correct ? 'correct-fb' : 'wrong-fb'}">
        ${correct ? '✅ Correct!' : `❌ Incorrect. Correct answer: <strong>${q.answer}</strong>`}
        ${q.hint ? ` — ${q.hint}` : ''}
      </div>`;
    } else if (!isSubmitted && userAns !== undefined && q.type !== 'written') {
      html += `<div class="q-feedback show pending-fb">✏️ Answer saved. Submit all when done.</div>`;
    }

    html += `</div>`; // end question-card
  });

  // Submit bar
  if (!sub.submitted && questions.length > 0) {
    const allDone = questions.every(q => sub.answers[q.id] !== undefined);
    html += `<div class="submit-hw-bar">
      <div>
        <p>Ready to submit?</p>
        <span>Answer all ${questions.length} questions before submitting.</span>
      </div>
      <button class="btn-submit-hw" onclick="submitHomework()"
        ${allDone ? '' : 'disabled'}>Submit Homework ✓</button>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

function saveAnswer(qid, value) {
  const store = getStore();
  const sub = getOrCreateSubmission(store, currentUser.id, store.currentWeek);
  if (sub.submitted) return;
  sub.answers[qid] = value;
  saveStore(store);
}

function answerMC(qid, opt) { saveAnswer(qid, opt); renderStudent(); }
function answerSA(qid, val) { saveAnswer(qid, val.trim()); renderStudent(); }
function answerOX(qid, val) { saveAnswer(qid, val); renderStudent(); }
function answerWritten(qid, val) { saveAnswer(qid, val); }

function submitHomework() {
  if (!confirm('Submit your homework? You cannot change answers after submitting.')) return;
  const store = getStore();
  const sub = getOrCreateSubmission(store, currentUser.id, store.currentWeek);
  sub.submitted = true;
  saveStore(store);
  renderStudent();
}

// ═══════════════════════════════════════
//   TEACHER VIEW
// ═══════════════════════════════════════
let teacherTab = 'results';

function renderTeacher() {
  const store = getStore();
  let html = `
    <div class="teacher-tabs">
      <button class="t-tab ${teacherTab==='results'?'active':''}" onclick="switchTeacherTab('results')">📊 Results</button>
      <button class="t-tab ${teacherTab==='questions'?'active':''}" onclick="switchTeacherTab('questions')">✏️ Manage Questions</button>
      <button class="t-tab ${teacherTab==='settings'?'active':''}" onclick="switchTeacherTab('settings')">⚙️ Settings</button>
    </div>`;

  if (teacherTab === 'results') html += renderResults(store);
  if (teacherTab === 'questions') html += renderQuestions(store);
  if (teacherTab === 'settings') html += renderSettings(store);

  document.getElementById('mainContent').innerHTML = html;
}

function switchTeacherTab(tab) {
  teacherTab = tab;
  renderTeacher();
}

function renderResults(store) {
  const students = store.users.filter(u => u.role === 'student');
  const week = store.currentWeek;
  const submittedCount = students.filter(s => {
    const sub = store.submissions[getSubmissionKey(s.id, week)];
    return sub && sub.submitted;
  }).length;
  const allQs = store.questions.filter(q => q.week === week);

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${students.length}</div><div class="stat-lbl">Total Students</div></div>
      <div class="stat-card"><div class="stat-num">${submittedCount}</div><div class="stat-lbl">Submitted Week ${week}</div></div>
      <div class="stat-card"><div class="stat-num">${allQs.length}</div><div class="stat-lbl">Questions This Week</div></div>
    </div>
    <div class="section-title">Week ${week} – Student Results</div>
    <table class="results-table">
      <thead><tr>
        <th>Student</th><th>Year</th><th>Year Group</th><th>Status</th><th>Score</th><th>Detail</th>
      </tr></thead>
      <tbody>`;

  students.forEach(s => {
    const key = getSubmissionKey(s.id, week);
    const sub = store.submissions[key];
    const yg = getStudentYearGroup(s.year);
    const qs = allQs.filter(q => q.year === yg);
    const autoQs = qs.filter(q => q.type !== 'written');

    let statusHtml, scoreHtml;
    if (!sub || !sub.submitted) {
      const answered = sub ? Object.keys(sub.answers).length : 0;
      statusHtml = `<span style="color:var(--muted);font-weight:700;">${answered > 0 ? `🔄 In Progress (${answered}/${qs.length})` : '⏳ Not Started'}</span>`;
      scoreHtml = `<span class="score-pill score-none">–</span>`;
    } else {
      statusHtml = `<span style="color:var(--green);font-weight:700;">✅ Submitted</span>`;
      const correct = autoQs.filter(q => sub.answers[q.id] === q.answer).length;
      const pct = autoQs.length > 0 ? Math.round(correct / autoQs.length * 100) : 0;
      const cls = pct >= 80 ? 'score-a' : pct >= 60 ? 'score-b' : pct >= 40 ? 'score-c' : 'score-d';
      const writtenQ = qs.filter(q => q.type === 'written');
      const hasUngraded = writtenQ.some(q => !sub.writtenGrades?.[q.id]);
      scoreHtml = `<span class="score-pill ${cls}">${pct}%</span>
        ${hasUngraded ? `<span class="score-pill score-pending" style="margin-left:4px;">Written ⏳</span>` : ''}`;
    }

    html += `<tr>
      <td><b>${s.name}</b></td>
      <td>Year ${s.year}</td>
      <td>${yg}</td>
      <td>${statusHtml}</td>
      <td>${scoreHtml}</td>
      <td><button class="btn-del" style="background:#dbeafe;color:var(--blue);"
        onclick="toggleDetail('${s.id}')">View</button></td>
    </tr>
    <tr><td colspan="6" style="padding:0;">
      <div class="detail-panel" id="detail_${s.id}">
        ${renderStudentDetail(s, sub, qs)}
      </div>
    </td></tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderStudentDetail(student, sub, questions) {
  if (!sub) return '<div class="empty-state">No activity yet.</div>';
  let html = `<h3>${student.name}'s Answers</h3>`;
  questions.forEach((q, idx) => {
    const ans = sub.answers[q.id];
    let cls = 'detail-none';
    let status = 'No answer';
    if (ans !== undefined) {
      if (q.type === 'written') {
        const grade = sub.writtenGrades?.[q.id];
        cls = 'detail-pending';
        status = grade !== undefined ? `Written answer – Grade: ${grade}/10` : 'Written answer – Awaiting grade';
      } else {
        cls = ans === q.answer ? 'detail-correct' : 'detail-wrong';
        status = ans === q.answer ? `✅ Correct (${ans})` : `❌ Wrong: answered "${ans}", correct: "${q.answer}"`;
      }
    }
    html += `<div class="detail-q ${cls}">
      <b>Q${idx+1}.</b> ${q.text.substring(0,80)}${q.text.length>80?'...':''} — ${status}`;

    if (q.type === 'written' && ans && sub.submitted) {
      const currentGrade = sub.writtenGrades?.[q.id] ?? '';
      html += `<div style="margin-top:8px;font-size:13px;">
        <b>Student's answer:</b> ${ans}<br>
        <input class="written-review-input" id="wg_${student.id}_${q.id}" 
          type="number" min="0" max="10" placeholder="Grade (0-10)"
          value="${currentGrade}" style="width:120px;display:inline-block;margin-top:6px;">
        <button class="btn-grade" onclick="gradeWritten('${student.id}','${q.id}')">Save Grade</button>
      </div>`;
    }
    html += `</div>`;
  });
  return html;
}

function toggleDetail(sid) {
  const el = document.getElementById('detail_' + sid);
  el.classList.toggle('show');
}

function gradeWritten(sid, qid) {
  const val = parseInt(document.getElementById(`wg_${sid}_${qid}`).value);
  if (isNaN(val) || val < 0 || val > 10) { alert('Please enter a grade from 0 to 10.'); return; }
  const store = getStore();
  const week = store.currentWeek;
  const key = getSubmissionKey(sid, week);
  if (!store.submissions[key].writtenGrades) store.submissions[key].writtenGrades = {};
  store.submissions[key].writtenGrades[qid] = val;
  saveStore(store);
  alert('Grade saved! ✅');
  renderTeacher();
}

function renderQuestions(store) {
  const week = store.currentWeek;
  const qs = store.questions.filter(q => q.week === week);
  let html = `<div class="add-q-form">
    <h2>➕ Add Question (Week ${week})</h2>
    <div class="form-row">
      <div class="form-field">
        <label>Year Group</label>
        <select id="nq_year">
          <option>Year 3-4</option><option>Year 5-6</option><option>Year 7-9</option>
        </select>
      </div>
      <div class="form-field">
        <label>Question Type</label>
        <select id="nq_type" onchange="updateAnswerField()">
          <option value="mc">Multiple Choice</option>
          <option value="sa">Short Answer</option>
          <option value="ox">True / False</option>
          <option value="written">Written</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>Question Text</label>
      <textarea id="nq_text" rows="3" placeholder="Type the question here..."></textarea>
    </div>
    <div id="answerSection">
      <div class="form-row" id="mcOptions">
        <div class="form-field"><label>Option A</label><input id="opt_a" placeholder="Option A"></div>
        <div class="form-field"><label>Option B</label><input id="opt_b" placeholder="Option B"></div>
        <div class="form-field"><label>Option C</label><input id="opt_c" placeholder="Option C"></div>
        <div class="form-field"><label>Option D</label><input id="opt_d" placeholder="Option D"></div>
      </div>
      <div class="form-field">
        <label id="answerLabel">Correct Answer</label>
        <input id="nq_answer" placeholder="e.g. 30 (for SA) or exact option text (for MC)">
      </div>
    </div>
    <div class="form-field">
      <label>Hint / Explanation (shown after submit)</label>
      <input id="nq_hint" placeholder="Optional: explain the solution">
    </div>
    <button class="btn-add-q" onclick="addQuestion()">Add Question ✓</button>
    <div class="success-msg" id="addSuccessMsg">✅ Question added!</div>
  </div>

  <div class="q-list-admin">
    <div class="section-title" style="margin-top:12px;">Week ${week} Questions (${qs.length})</div>`;

  if (qs.length === 0) {
    html += '<div class="empty-state">No questions yet for this week.</div>';
  }
  qs.forEach((q, idx) => {
    const typeLabel = { mc:'MCQ', sa:'Short Answer', ox:'T/F', written:'Written' }[q.type];
    html += `<div class="q-admin-item">
      <div class="q-num" style="width:32px;height:32px;font-size:13px;background:#162040;color:#d4af37;">${idx+1}</div>
      <div style="flex:1">
        <div class="q-admin-text">${q.text.substring(0,90)}${q.text.length>90?'...':''}</div>
        <div class="q-admin-meta">${q.year} · ${typeLabel} ${q.answer ? '· Answer: ' + q.answer : ''}</div>
      </div>
      <button class="btn-del" onclick="deleteQuestion('${q.id}')">Delete</button>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function updateAnswerField() {
  const type = document.getElementById('nq_type').value;
  const mcEl = document.getElementById('mcOptions');
  const lbl = document.getElementById('answerLabel');
  const ans = document.getElementById('nq_answer');
  if (type === 'mc') {
    mcEl.style.display = 'grid';
    lbl.textContent = 'Correct Answer (must match one of the options exactly)';
    ans.style.display = 'block'; ans.placeholder = 'e.g. 30';
  } else if (type === 'ox') {
    mcEl.style.display = 'none';
    lbl.textContent = 'Correct Answer';
    ans.style.display = 'block'; ans.placeholder = 'O (True) or X (False)';
  } else if (type === 'sa') {
    mcEl.style.display = 'none';
    lbl.textContent = 'Correct Answer (exact)';
    ans.style.display = 'block'; ans.placeholder = 'e.g. 84';
  } else {
    mcEl.style.display = 'none';
    lbl.textContent = 'Answer (optional – for your reference)';
    ans.style.display = 'block'; ans.placeholder = 'Model answer for grading reference';
  }
}

function addQuestion() {
  const type = document.getElementById('nq_type').value;
  const text = document.getElementById('nq_text').value.trim();
  const year = document.getElementById('nq_year').value;
  const answer = document.getElementById('nq_answer').value.trim();
  const hint = document.getElementById('nq_hint').value.trim();
  if (!text) { alert('Please enter a question.'); return; }
  if (type !== 'written' && !answer) { alert('Please enter the correct answer.'); return; }

  let options = null;
  if (type === 'mc') {
    options = [
      document.getElementById('opt_a').value.trim(),
      document.getElementById('opt_b').value.trim(),
      document.getElementById('opt_c').value.trim(),
      document.getElementById('opt_d').value.trim(),
    ];
    if (options.some(o => !o)) { alert('Please fill all 4 options.'); return; }
  }

  const store = getStore();
  const id = 'q_' + Date.now();
  store.questions.push({ id, week: store.currentWeek, year, type, text, options, answer: answer || null, hint });
  saveStore(store);
  document.getElementById('addSuccessMsg').style.display = 'block';
  setTimeout(() => { renderTeacher(); }, 800);
}

function deleteQuestion(qid) {
  if (!confirm('Delete this question?')) return;
  const store = getStore();
  store.questions = store.questions.filter(q => q.id !== qid);
  saveStore(store);
  renderTeacher();
}

function renderSettings(store) {
  const students = store.users.filter(u => u.role === 'student');
  return `
    <div class="add-q-form">
      <h2>⚙️ Settings</h2>
      <div class="form-field">
        <label>Current Week Number</label>
        <div style="display:flex;gap:12px;align-items:center;">
          <input id="weekNum" type="number" min="1" max="52" value="${store.currentWeek}" style="width:100px;">
          <button class="btn-add-q" onclick="setWeek()">Update Week</button>
        </div>
      </div>
    </div>
    <div class="add-q-form" style="margin-top:20px;">
      <h2>👨‍🎓 Student Accounts</h2>
      <table class="results-table" style="margin-top:8px;">
        <thead><tr><th>ID</th><th>Name</th><th>Year</th><th>Password</th></tr></thead>
        <tbody>
          ${students.map(s => `<tr>
            <td>${s.id}</td>
            <td><b>${s.name}</b></td>
            <td>Year ${s.year}</td>
            <td><span style="color:var(--muted);">••••••••</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="margin-top:20px;">
        <h3 style="font-family:'Baloo 2';color:var(--navy);margin-bottom:16px;">Add New Student</h3>
        <div class="form-row">
          <div class="form-field"><label>Student ID</label><input id="ns_id" placeholder="e.g. student06"></div>
          <div class="form-field"><label>Name</label><input id="ns_name" placeholder="Full name"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Year Level</label>
            <select id="ns_year">${[3,4,5,6,7,8,9].map(y=>`<option value="${y}">Year ${y}</option>`).join('')}</select>
          </div>
          <div class="form-field"><label>Password</label><input id="ns_pw" placeholder="e.g. math2024" value="math2024"></div>
        </div>
        <button class="btn-add-q" onclick="addStudent()">Add Student ✓</button>
        <div class="success-msg" id="studentSuccessMsg">✅ Student added!</div>
      </div>
    </div>`;
}

function setWeek() {
  const w = parseInt(document.getElementById('weekNum').value);
  if (!w || w < 1) return;
  const store = getStore();
  store.currentWeek = w;
  saveStore(store);
  alert(`Current week set to Week ${w}.`);
  renderTeacher();
}

function addStudent() {
  const id = document.getElementById('ns_id').value.trim();
  const name = document.getElementById('ns_name').value.trim();
  const year = parseInt(document.getElementById('ns_year').value);
  const pw = document.getElementById('ns_pw').value.trim();
  if (!id || !name || !pw) { alert('Please fill all fields.'); return; }
  const store = getStore();
  if (store.users.find(u => u.id === id)) { alert('This student ID already exists.'); return; }
  store.users.push({ id, pw, role: 'student', name, year });
  saveStore(store);
  document.getElementById('studentSuccessMsg').style.display = 'block';
  setTimeout(() => renderTeacher(), 800);
}
</script>
</body>
</html>
